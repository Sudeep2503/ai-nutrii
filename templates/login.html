{% extends 'base.html' %}

{% block title %}Login | NutriSense AI{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-lg-5 col-md-7">
    <div class="card shadow-sm border-0 p-4 p-md-5">
      <div class="text-center mb-4">
        <p class="text-primary fw-semibold mb-2">Secure Access</p>
        <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
        <p class="text-muted">Sign in to continue your wellness journey.</p>
      </div>

      <form method="post" class="needs-validation" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email Address</label>
          <input class="form-control" id="email" name="email" type="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Password</label>
          <input class="form-control" id="password" name="password" type="password" required />
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" id="remember_me" name="remember_me" type="checkbox" />
          <label class="form-check-label" for="remember_me">Remember me</label>
        </div>
        <button class="btn btn-primary w-100" type="submit">Sign In</button>
      </form>

      <div class="d-flex justify-content-between mt-3">
        <a class="small text-decoration-none" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
        <a class="small text-decoration-none" href="{{ url_for('auth.register') }}">Create account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
