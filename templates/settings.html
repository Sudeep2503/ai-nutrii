{% extends 'base.html' %}

{% block title %}Settings | NutriSense AI{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-xl-7 col-lg-8">
    <div class="card shadow-sm border-0 p-4 p-md-5">
      <div class="mb-4">
        <p class="text-primary fw-semibold mb-2">Settings</p>
        <h1 class="h3 fw-bold mb-2">Personalize your experience</h1>
        <p class="text-muted">Choose your preferred theme, language, and notification settings.</p>
      </div>

      <form method="post" class="needs-validation" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="theme_preference">Theme</label>
            <select class="form-select" id="theme_preference" name="theme_preference">
              <option value="light" {% if user_settings.theme_preference == 'light' %}selected{% endif %}>Light Mode</option>
              <option value="dark" {% if user_settings.theme_preference == 'dark' %}selected{% endif %}>Dark Mode</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="preferred_language">Language</label>
            <select class="form-select" id="preferred_language" name="preferred_language">
              <option value="en" {% if user_settings.preferred_language == 'en' %}selected{% endif %}>English</option>
              <option value="es" {% if user_settings.preferred_language == 'es' %}selected{% endif %}>Spanish</option>
            </select>
          </div>
        </div>

        <div class="border rounded p-3 mt-4 bg-light">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="notify_email" name="notify_email" {% if user_settings.notify_email %}checked{% endif %} />
            <label class="form-check-label" for="notify_email">Email notifications</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="notify_sms" name="notify_sms" {% if user_settings.notify_sms %}checked{% endif %} />
            <label class="form-check-label" for="notify_sms">SMS notifications</label>
          </div>
        </div>

        <button class="btn btn-primary mt-4" type="submit">Save Preferences</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
