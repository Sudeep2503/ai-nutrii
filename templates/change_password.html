{% extends 'base.html' %}

{% block title %}Change Password | NutriSense AI{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-xl-6 col-lg-7">
    <div class="card shadow-sm border-0 p-4 p-md-5">
      <div class="mb-4">
        <p class="text-primary fw-semibold mb-2">Security</p>
        <h1 class="h3 fw-bold mb-2">Change Password</h1>
        <p class="text-muted">Update your account password securely.</p>
      </div>

      <form method="post" class="needs-validation" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label fw-semibold" for="current_password">Current Password</label>
            <input class="form-control" id="current_password" name="current_password" type="password" required />
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="new_password">New Password</label>
            <input class="form-control" id="new_password" name="new_password" type="password" required />
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="confirm_password">Confirm New Password</label>
            <input class="form-control" id="confirm_password" name="confirm_password" type="password" required />
          </div>
        </div>

        <button class="btn btn-primary mt-4" type="submit">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
