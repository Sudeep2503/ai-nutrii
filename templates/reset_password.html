{% extends 'base.html' %}

{% block title %}Reset Password | NutriSense AI{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-lg-5 col-md-7">
    <div class="card shadow-sm border-0 p-4 p-md-5">
      <div class="text-center mb-4">
        <p class="text-primary fw-semibold mb-2">Security</p>
        <h1 class="h3 fw-bold mb-2">Choose a New Password</h1>
        <p class="text-muted">Use a strong password to keep your account secure.</p>
      </div>

      <form method="post" class="needs-validation" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">New Password</label>
          <input class="form-control" id="password" name="password" type="password" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="confirm_password">Confirm Password</label>
          <input class="form-control" id="confirm_password" name="confirm_password" type="password" required />
        </div>
        <button class="btn btn-primary w-100" type="submit">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
